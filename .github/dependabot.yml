version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "terraform"
    # Major-version provider bumps are migrations, not drive-by changes
    # (see CONTRIBUTING.md "Out of bounds"). Allow minor / patch only.
    ignore:
      - dependency-name: "cloudflare/cloudflare"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "hashicorp/aws"
        update-types:
          - "version-update:semver-major"
