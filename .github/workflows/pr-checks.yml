name: pr-checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/pr-checks.yml'
              - '.github/workflows/terraform-apply.yml'

  terraform-plan:
    name: terraform-plan
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-plan-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: terraform
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_server_ipv4: ${{ vars.SERVER_IPV4 }}
      TF_VAR_server_ipv6: ${{ vars.SERVER_IPV6 }}
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: terraform fmt
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: terraform init
        run: terraform init -input=false

      - name: terraform validate
        run: terraform validate -no-color

      - name: terraform plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan > plan.txt 2>&1
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
          cat plan.txt

      - name: Comment plan on PR
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN_EXIT: ${{ steps.plan.outputs.exitcode }}
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
        with:
          script: |
            const fs = require('fs');
            let plan = '(no plan output)';
            try { plan = fs.readFileSync('terraform/plan.txt', 'utf8'); } catch (_) {}
            const max = 60000;
            if (plan.length > max) plan = plan.slice(0, max) + '\n\n…(truncated)';

            const body = [
              '### Terraform plan',
              '',
              `- **fmt:** \`${process.env.FMT_OUTCOME}\``,
              `- **plan exit code:** \`${process.env.PLAN_EXIT}\` (0 = no changes, 2 = changes pending)`,
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0' && steps.plan.outputs.exitcode != '2'
        run: |
          echo "terraform plan failed (exit ${{ steps.plan.outputs.exitcode }})"
          exit 1

      - name: Fail if fmt drift
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "terraform fmt drift detected. Run 'terraform fmt -recursive' inside terraform/ locally."
          exit 1

  plan:
    name: plan
    needs: [changes, terraform-plan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify plan succeeded or was skipped
        run: |
          changes_result="${{ needs.changes.result }}"
          plan_result="${{ needs.terraform-plan.result }}"
          echo "changes job:        $changes_result"
          echo "terraform-plan job: $plan_result"
          if [[ "$changes_result" != "success" ]]; then
            echo "FAIL: changes detection did not succeed."
            exit 1
          fi
          if [[ "$plan_result" == "success" || "$plan_result" == "skipped" ]]; then
            echo "PASS: terraform-plan was $plan_result."
            exit 0
          fi
          echo "FAIL: terraform-plan result was $plan_result."
          exit 1
