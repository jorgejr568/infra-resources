name: pr-checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'
              - '.github/workflows/pr-checks.yml'
              - '.github/workflows/terraform-apply.yml'

  terraform-plan:
    name: terraform-plan
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-plan-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: terraform
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_server_ipv4: ${{ vars.SERVER_IPV4 }}
      TF_VAR_server_ipv6: ${{ vars.SERVER_IPV6 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: terraform fmt
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: terraform init
        run: terraform init -input=false

      - name: terraform validate
        run: terraform validate -no-color

      - name: terraform plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan > plan.txt 2>&1
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
          cat plan.txt

      - name: Comment plan on PR
        if: always()
        uses: actions/github-script@v9
        env:
          PLAN_EXIT: ${{ steps.plan.outputs.exitcode }}
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
        with:
          script: |
            const fs = require('fs');
            let plan = '(no plan output)';
            try { plan = fs.readFileSync('terraform/plan.txt', 'utf8'); } catch (_) {}

            // Split plan output into the noisy refresh-state preamble and
            // the actual plan summary, so the comment can show the summary
            // up front and tuck the full output in a collapsed section.
            const postMarkers = [
              'Terraform used the selected providers',
              'No changes. Your infrastructure matches',
              'Note: Objects have changed outside of Terraform',
              'Changes to Outputs:',
            ];
            let postIdx = -1;
            for (const m of postMarkers) {
              const i = plan.indexOf(m);
              if (i !== -1 && (postIdx === -1 || i < postIdx)) postIdx = i;
            }
            const post = postIdx === -1
              ? null
              : plan.slice(plan.lastIndexOf('\n', postIdx) + 1);

            const truncate = (s, max) =>
              s.length > max ? s.slice(0, max) + '\n\n…(truncated)' : s;
            const POST_MAX = 30000;
            const RAW_MAX = 25000;
            const postShown = post == null ? null : truncate(post, POST_MAX);
            const rawShown = truncate(plan, RAW_MAX);

            const body = [
              '### Terraform plan',
              '',
              `- **fmt:** \`${process.env.FMT_OUTCOME}\``,
              `- **plan exit code:** \`${process.env.PLAN_EXIT}\` (0 = no changes, 2 = changes pending)`,
              '',
              '<details open><summary>Plan output</summary>',
              '',
              '```hcl',
              postShown == null ? rawShown : postShown,
              '```',
              '',
              '</details>',
            ];

            if (postShown != null) {
              body.push(
                '',
                '<details><summary>Raw plan output (incl. refresh state)</summary>',
                '',
                '```hcl',
                rawShown,
                '```',
                '',
                '</details>',
              );
            }
            const finalBody = body.join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: finalBody,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0' && steps.plan.outputs.exitcode != '2'
        run: |
          echo "terraform plan failed (exit ${{ steps.plan.outputs.exitcode }})"
          exit 1

      - name: Fail if fmt drift
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "terraform fmt drift detected. Run 'terraform fmt -recursive' inside terraform/ locally."
          exit 1

  tflint:
    name: tflint
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.55.0

      - name: tflint --init
        run: tflint --init

      - name: tflint
        run: tflint --recursive --format=compact

  trivy-config:
    name: trivy-config
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform/
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore

  plan:
    name: plan
    needs: [changes, terraform-plan, tflint, trivy-config]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded or were skipped
        run: |
          changes_result="${{ needs.changes.result }}"
          plan_result="${{ needs.terraform-plan.result }}"
          tflint_result="${{ needs.tflint.result }}"
          trivy_result="${{ needs.trivy-config.result }}"
          echo "changes:      $changes_result"
          echo "terraform:    $plan_result"
          echo "tflint:       $tflint_result"
          echo "trivy-config: $trivy_result"
          if [[ "$changes_result" != "success" ]]; then
            echo "FAIL: changes detection did not succeed."
            exit 1
          fi
          for r in "$plan_result" "$tflint_result" "$trivy_result"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "FAIL: a required job result was $r."
              exit 1
            fi
          done
          echo "PASS"
