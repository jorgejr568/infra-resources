name: terraform-plan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/projects/**"
      - ".github/workflows/terraform-plan.yml"
      - ".github/workflows/terraform-apply.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.ref }}-${{ matrix.project }}
  cancel-in-progress: true

jobs:
  plan:
    name: plan (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [hooks-fyi]
    defaults:
      run:
        working-directory: terraform/projects/${{ matrix.project }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: terraform fmt
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: terraform init
        id: init
        run: terraform init -input=false

      - name: terraform validate
        id: validate
        run: terraform validate -no-color

      - name: terraform plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan > plan.txt 2>&1
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
          cat plan.txt

      - name: Comment plan on PR
        if: always()
        uses: actions/github-script@v7
        env:
          PROJECT: ${{ matrix.project }}
          PLAN_EXIT: ${{ steps.plan.outputs.exitcode }}
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
          INIT_OUTCOME: ${{ steps.init.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
        with:
          script: |
            const fs = require('fs');
            const project = process.env.PROJECT;
            const path = `terraform/projects/${project}/plan.txt`;
            let plan = '(no plan output)';
            try { plan = fs.readFileSync(path, 'utf8'); } catch (_) {}
            const max = 60000;
            if (plan.length > max) plan = plan.slice(0, max) + '\n\n…(truncated)';

            const body = [
              `### Terraform plan — \`${project}\``,
              '',
              `- **fmt:** \`${process.env.FMT_OUTCOME}\``,
              `- **init:** \`${process.env.INIT_OUTCOME}\``,
              `- **validate:** \`${process.env.VALIDATE_OUTCOME}\``,
              `- **plan exit code:** \`${process.env.PLAN_EXIT}\``,
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0' && steps.plan.outputs.exitcode != '2'
        run: |
          echo "terraform plan failed (exit ${{ steps.plan.outputs.exitcode }})"
          exit 1

      - name: Fail if fmt drift
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "terraform fmt drift detected. Run 'terraform fmt -recursive' locally."
          exit 1
