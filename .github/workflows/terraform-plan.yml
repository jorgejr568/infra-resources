name: terraform-plan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/projects/**"
      - ".github/workflows/terraform-plan.yml"
      - ".github/workflows/terraform-apply.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-plan-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: terraform fmt
        id: fmt
        run: terraform fmt -check -recursive terraform/projects
        continue-on-error: true

      - name: terraform plan (per project)
        id: plan
        shell: bash
        run: |
          set +e
          overall_exit=0
          : > plan-summary.md
          for dir in terraform/projects/*/; do
            project="$(basename "$dir")"
            echo "::group::plan $project"
            (
              cd "$dir"
              terraform init -input=false
              terraform validate -no-color
              terraform plan -no-color -input=false -out=tfplan
            ) > "$dir/plan.txt" 2>&1
            ec=$?
            cat "$dir/plan.txt"
            echo "::endgroup::"

            {
              echo "## \`$project\` (exit $ec)"
              echo
              echo "<details><summary>Plan output</summary>"
              echo
              echo '```hcl'
              tail -c 60000 "$dir/plan.txt"
              echo '```'
              echo
              echo "</details>"
              echo
            } >> plan-summary.md

            if [[ "$ec" != "0" && "$ec" != "2" ]]; then
              overall_exit=$ec
            fi
          done
          echo "exitcode=$overall_exit" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment plan on PR
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN_EXIT: ${{ steps.plan.outputs.exitcode }}
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
        with:
          script: |
            const fs = require('fs');
            let summary = '(no plan output)';
            try { summary = fs.readFileSync('plan-summary.md', 'utf8'); } catch (_) {}
            const max = 60000;
            if (summary.length > max) summary = summary.slice(0, max) + '\n\n…(truncated)';

            const body = [
              '### Terraform plan',
              '',
              `- **fmt:** \`${process.env.FMT_OUTCOME}\``,
              `- **plan exit code:** \`${process.env.PLAN_EXIT}\` (0 = no changes, 2 = changes pending)`,
              '',
              summary,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0' && steps.plan.outputs.exitcode != '2'
        run: |
          echo "terraform plan failed (exit ${{ steps.plan.outputs.exitcode }})"
          exit 1

      - name: Fail if fmt drift
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "terraform fmt drift detected. Run 'terraform fmt -recursive terraform/projects' locally."
          exit 1
