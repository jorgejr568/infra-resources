name: Pulumi Preview
on:
  - pull_request
jobs:
  preview:
    name: Preview
    runs-on: ubuntu-latest
    outputs:
      output: ${{ steps.pulumi-preview.outputs.output }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v3
        with:
          go-version: 'stable'
      - run: go mod download
      - uses: pulumi/actions@v6
        id: pulumi-preview
        with:
          command: preview
          stack-name: ${{ vars.STACK_NAME }}
          diff: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  comment:
    name: Comment
    runs-on: ubuntu-latest
    needs: preview
    permissions:
      contents: write
      pull-requests: write
    steps:
        - uses: actions/checkout@v4
        - name: Write file
          run: |
            echo "### Pulumi Preview" > output.txt
            echo "" >> output.txt
            echo '```' >> output.txt
        - name: Append output
          env:
            PULUMI_OUTPUT: ${{ needs.preview.outputs.output }}
          run: printf '%s\n' "$PULUMI_OUTPUT" >> output.txt
        - name: Append file
          run: |
            echo '```' >> output.txt
            echo "" >> output.txt
            echo "This is an automated comment." >> output.txt
        - name: Comment on PR
          run: gh pr comment ${{ github.event.pull_request.number }} --body "$(cat output.txt)"
          env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
